version: "2"
sql:
  - engine: "sqlite"
    queries: ["pkg/models/query.sql"]
    schema: ["pkg/db/fasoladb/minutes_schema.sql", "pkg/db/views.sql"]
    gen:
      go:
        package: "models"
        out: "pkg/models"
        emit_pointers_for_null_types: true
        emit_db_tags: true
        emit_json_tags: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        json_tags_case_style: "snake"
        initialisms: ["id", "url"]
